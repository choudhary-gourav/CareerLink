# ─── Server ──────────────────────────────────────────────────
# Render injects PORT at runtime; fallback to 8080 locally
server.port=${PORT:8080}

# ─── Application ─────────────────────────────────────────────
spring.application.name=JobProject

# ─── Local dev overrides (gitignored, never deployed) ────────
spring.config.import=optional:classpath:application-local.properties

# ─── MongoDB Atlas ───────────────────────────────────────────
# Set SPRING_DATA_MONGODB_URI or MONGODB_URI as a secret env var in Render dashboard
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI}}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:${MONGODB_DATABASE:Gourav}}

# ─── Connection pool tuning (important on Render free tier) ──
spring.data.mongodb.uri.connection-timeout=10000
spring.mongodb.embedded.version=

# ─── CORS ────────────────────────────────────────────────────
# Set CORS_ALLOWED_ORIGINS as env var in Render, e.g.:
# https://your-app.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── Actuator (health check for Render) ──────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ─────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example.JobProject=INFO
