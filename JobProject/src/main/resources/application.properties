spring.application.name=JobProject

server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:Gourav}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.root=WARN
logging.level.com.example.JobProject=INFO